name: Publish Python Package

'on':
  push:
    tags:
      - v*
  workflow_dispatch:
    inputs:
      publish_to_testpypi:
        description: Publish package to TestPyPI instead of PyPI
        required: true
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Verify tag matches pyproject version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PYPROJECT_VERSION=$(python - <<'PY'
          import tomllib

          with open("pyproject.toml", "rb") as f:
              data = tomllib.load(f)
          print(data["tool"]["poetry"]["version"])
          PY
          )

          if [[ "$TAG_VERSION" != "$PYPROJECT_VERSION" ]]; then
            echo "Tag version ($TAG_VERSION) does not match pyproject version ($PYPROJECT_VERSION)."
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: python -m pip install --upgrade build twine

      - name: Build distributions
        run: python -m build

      - name: Check package metadata
        run: python -m twine check dist/*

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/

  publish-testpypi:
    if: github.event_name == 'workflow_dispatch' && fromJSON(inputs.publish_to_testpypi)
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
    environment:
      name: development
      url: https://test.pypi.org/p/omnia-timeseries
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist/

      - name: Publish to TestPyPI (trusted publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
    environment:
      name: production
      url: https://pypi.org/p/omnia-timeseries
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist/

      - name: Publish to PyPI (trusted publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
